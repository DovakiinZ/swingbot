# ==============================================================================
# SWINGBOT CONFIGURATION — Production Ready
# ==============================================================================

# -- Exchange ------------------------------------------------------------------
trading_exchange: mexc
market_data_exchange: bybit
bybit_account_type: spot
trading_mode: live

# -- Scan Speed ----------------------------------------------------------------
scan_interval_minutes: 10

# -- Strategy & Scanning -------------------------------------------------------
timeframe: "1h"
lookback: 100
scan_top_n: 30
scanner:
  enabled: true
  breakout_lookback: 20
  btc_correlation_factor: 0.7

# -- Multi-Timeframe Confluence ------------------------------------------------
mtf_filter_enabled: false
htf_timeframe: "4h"
htf_ema_period: 200

# -- Funding Rate Filter -------------------------------------------------------
funding_rate_filter: false
funding_long_block: 0.0008
funding_short_block: -0.0005

# -- Signal Quality Gates ------------------------------------------------------
allow_short: true
min_score: 40
min_rr_ratio: 1.5
volume_multiplier: 1.0
signal_score_threshold: 35

# -- Risk Management -----------------------------------------------------------
# Small-account compounding mode: 1 position at a time using 95% of balance
# Scales up naturally as balance grows: $5 → $10 → $20 → $50 → $100 → $500 → $1000
risk_per_trade_percent: 3.0
max_risk_per_trade_pct: 5.0
max_open_positions: 1
max_portfolio_risk_percent: 100.0
max_single_position_percent: 95.0
daily_loss_limit_percent: 20.0
max_daily_loss_usd: 50.0
consecutive_loss_limit: 5
api_failure_limit: 5

# -- Compounding ---------------------------------------------------------------
base_balance: 1000.0
peak_balance_tracking: true
drawdown_reset_threshold: 0.20

# -- Market Regime Detection ---------------------------------------------------
regime_adx_threshold: 15

# -- Breakout Detection --------------------------------------------------------
breakout_lookback: 20
breakout_volume_mult: 2.0
breakout_compression_atr: 2.0

# -- Database ------------------------------------------------------------------
db_path: "swingbot.db"

# -- Paper Trading -------------------------------------------------------------
paper_start_balance_usdt: 1000.0

# -- Dynamic Symbol Scanner (Binance + Bybit + MEXC) --------------------------
dynamic_symbols: true
max_symbols: 50
min_24h_volume_usdt: 1000000

# -- Sentiment (4-source engine) -----------------------------------------------
sentiment_threshold: 0
fear_greed_enabled: true
cryptopanic_token: ""
santiment_token: ""
lunarcrush_token: ""

# -- Committee Agent Weights ---------------------------------------------------
committee_enabled: false
trend_agent_weight: 0.25
momentum_agent_weight: 0.20
sentiment_agent_weight: 0.25
risk_agent_weight: 0.20
pattern_agent_weight: 0.10

# -- Volume Filter -------------------------------------------------------------
min_volume_usdt: 5000000

# -- Polymarket ----------------------------------------------------------------
polymarket:
  enabled: false
  update_hours: 6
  markets: []
  default_risk_scale_on_failure: 1.0

# -- Multi-Armed Bandit --------------------------------------------------------
bandit:
  exploration_prob: 0.2

# -- Trading Hours -------------------------------------------------------------
trading_hours:
  enabled: false

# -- Account -------------------------------------------------------------------
account_name: "Swingbot Live"
live: true
show_balances_on_startup: true

# -- Localization --------------------------------------------------------------
lang: "en"

# -- WebSocket Real-Time Monitor -----------------------------------------------
websocket:
  enabled: true
  symbols:
    - BTC/USDT
    - ETH/USDT
    - SOL/USDT
    - BNB/USDT
    - XRP/USDT
    - DOGE/USDT
    - ADA/USDT
    - AVAX/USDT
    - DOT/USDT
    - MATIC/USDT

# -- ATR-Based Stop Loss / Take Profit -----------------------------------------
atr_multiplier_sl: 1.5
atr_multiplier_tp: 3.0

# -- Trailing Stop -------------------------------------------------------------
trailing_stop_activate_pct: 0.01
trailing_stop_trail_pct: 0.008

# -- Momentum Breakout Strategy ------------------------------------------------
momentum_min_change: 0.003
momentum_min_volume: 1.5
momentum_sl_mult: 2.0
momentum_tp_mult: 4.0
momentum_cooldown_sec: 300

# -- Trailing Entry ------------------------------------------------------------
trailing_entry:
  enabled: false
  pullback_pct: 0.003
  expiry_seconds: 3600

# -- Kelly Criterion Sizing ----------------------------------------------------
kelly_sizing:
  enabled: false
  fraction: 0.25

# -- Notifications -------------------------------------------------------------
notifications:
  discord:
    enabled: true
    channels:
      general: "https://discord.com/api/webhooks/1483934741265907772/LCHSthgJHFIpzvL0xlE79dTa2o1WnfU4aXzhDmw27Y4z5ray5FQrxIfHCQhO0TYlLR8s"
      trades: "https://discord.com/api/webhooks/1483934741265907772/LCHSthgJHFIpzvL0xlE79dTa2o1WnfU4aXzhDmw27Y4z5ray5FQrxIfHCQhO0TYlLR8s"
      closed: "https://discord.com/api/webhooks/1483934741265907772/LCHSthgJHFIpzvL0xlE79dTa2o1WnfU4aXzhDmw27Y4z5ray5FQrxIfHCQhO0TYlLR8s"
      warnings: "https://discord.com/api/webhooks/1483934741265907772/LCHSthgJHFIpzvL0xlE79dTa2o1WnfU4aXzhDmw27Y4z5ray5FQrxIfHCQhO0TYlLR8s"
