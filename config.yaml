# ==============================================================================
# SWINGBOT CONFIGURATION
# ==============================================================================

# -- Exchange Architecture -----------------------------------------------------
# trading_exchange   : where orders are placed (your account — MEXC)
# market_data_exchange: where we READ prices/candles/funding rates (Bybit — public API)
# Bybit and Binance are used READ-ONLY as market indicators, no API keys needed
trading_exchange: mexc
market_data_exchange: bybit          # public API only — no auth needed
bybit_account_type: spot
trading_mode: paper

# -- Scan Speed ----------------------------------------------------------------
scan_interval_minutes: 10

# -- Strategy & Scanning -------------------------------------------------------
timeframe: "1h"
lookback: 100
scan_top_n: 20
scanner:
  enabled: true
  breakout_lookback: 20
  btc_correlation_factor: 0.7

# -- Multi-Timeframe Confluence (MTF) -----------------------------------------
# Research: Adding 4H filter raises Profit Factor from ~1.4 to ~2.0+
# Only take 1H longs when 4H trend is up; only take 1H shorts when 4H is down
mtf_filter_enabled: true
htf_timeframe: "4h"
htf_ema_period: 200

# -- Funding Rate Filter (Bybit public API) ------------------------------------
# Positive funding = longs overcrowded → avoid new longs
# Negative funding = shorts overcrowded → avoid new shorts
funding_rate_filter: true
funding_long_block: 0.0008    # Block longs if funding > 0.08%/8h
funding_short_block: -0.0005  # Block shorts if funding < -0.05%/8h

# -- Signal Quality Gates ------------------------------------------------------
allow_short: true
min_score: 65                  # Raised from 55 — breakout detection adds 25pts to good setups
min_rr_ratio: 1.8             # FIX 4: Minimum Risk:Reward ratio (rejects trades where loss > gain)
volume_multiplier: 1.2         # FIX 5: Current volume must be >= 1.2x 20-period average

# -- Risk Management -----------------------------------------------------------
risk_per_trade_percent: 2.0    # FIX 6: Risk 2% of balance per trade (was 1%)
max_risk_per_trade_pct: 2.0    # FIX 6: Hard cap on risk per trade
max_open_positions: 3
max_portfolio_risk_percent: 5.0
max_single_position_percent: 30.0
daily_loss_limit_percent: 5.0
max_daily_loss_usd: 15.0       # FIX 7: Hard dollar daily loss limit — stop all trading
consecutive_loss_limit: 5
api_failure_limit: 5

# -- Compounding Plan ($100 -> $1000) ------------------------------------------
base_balance: 1000.0
peak_balance_tracking: true
drawdown_reset_threshold: 0.20

# -- Breakout Detection --------------------------------------------------------
breakout_lookback: 20
breakout_volume_mult: 2.0
breakout_compression_atr: 2.0

# -- Database ------------------------------------------------------------------
db_path: "swingbot.db"

# -- Paper Trading -------------------------------------------------------------
paper_start_balance_usdt: 1000.0

# -- Sentiment Gate ------------------------------------------------------------
sentiment_threshold: 10

# -- Volume Filter -------------------------------------------------------------
min_volume_usdt: 10000000

# -- Polymarket (Macro Filter) -------------------------------------------------
polymarket:
  enabled: false
  update_hours: 6
  markets: []
  default_risk_scale_on_failure: 1.0

# -- Multi-Armed Bandit --------------------------------------------------------
bandit:
  exploration_prob: 0.2

# -- Trading Hours (UTC) -------------------------------------------------------
trading_hours:
  enabled: false               # Disabled: trade any hour in paper mode

# -- Account Info --------------------------------------------------------------
account_name: "Swingbot Paper"
live: false
show_balances_on_startup: true

# -- Localization --------------------------------------------------------------
lang: "en"

# -- WebSocket Real-Time Monitor -----------------------------------------------
websocket:
  enabled: true
  symbols:                    # Symbols to monitor at startup
    - BTC/USDT
    - ETH/USDT
    - SOL/USDT
    - BNB/USDT
    - XRP/USDT
    - DOGE/USDT
    - ADA/USDT
    - AVAX/USDT
    - DOT/USDT
    - MATIC/USDT

# -- ATR-Based Stop Loss / Take Profit (FIX 3) ---------------------------------
atr_multiplier_sl: 2.0        # SL = entry ± (ATR × this). Minimum enforced, prevents tight stops
atr_multiplier_tp: 4.0        # TP = entry ± (ATR × this). Gives 2:1 R:R minimum

# -- Trailing Stop (FIX 8) ----------------------------------------------------
trailing_stop_activate_pct: 0.01  # Activate trailing stop after +1% profit
trailing_stop_trail_pct: 0.008    # Trail 0.8% behind current price

# -- Momentum Breakout Strategy ------------------------------------------------
momentum_min_change: 0.003    # 0.3% price move to trigger (lower = more trades)
momentum_min_volume: 2.0      # 2x average volume required
momentum_sl_mult: 2.0         # Stop loss = 2.0x ATR (was 1.5 — too tight)
momentum_tp_mult: 4.0         # Take profit = 4.0x ATR (was 2.5 — now 2:1 R:R)
momentum_cooldown_sec: 300    # 5 min between signals per symbol

# -- Trailing Entry (passivbot technique) --------------------------------------
trailing_entry:
  enabled: false               # false = enter immediately, true = wait for pullback
  pullback_pct: 0.003          # Wait for 0.3% pullback before entering
  expiry_seconds: 3600         # Cancel if no pullback within 1 hour

# -- Kelly Criterion Sizing ----------------------------------------------------
kelly_sizing:
  enabled: false               # false = use phase-based risk, true = use Kelly formula
  fraction: 0.25               # Quarter-Kelly (conservative). Full Kelly = 1.0 (risky)

# -- Dashboard -----------------------------------------------------------------
dashboard:
  enabled: true
  port: 8080
  host: '0.0.0.0'
